name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - run: pip install --quiet semgrep
      - name: Scan (blocking on findings)
        run: >-
          semgrep scan
          --config=p/security-audit
          --config=p/owasp-top-ten
          --config=p/typescript
          --config=p/react
          --config=p/nextjs
          --error --metrics=off
          --exclude node_modules --exclude .next --exclude dist --exclude .turbo

  gitleaks:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Scan for secrets
        run: docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:latest detect --source=/repo --redact --verbose

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
      # npm retired the legacy /security/audits endpoint (410); pnpm 11 uses the
      # bulk advisory endpoint. Run pnpm 11 via npx so the repo's packageManager
      # stays on pnpm 9, and disable pnpm's version self-management so it doesn't
      # re-exec pnpm 9 (which would hit the dead endpoint again).
      - name: Audit production deps (fail on high/critical)
        env:
          npm_config_manage_package_manager_versions: "false"
        run: npx --yes pnpm@11 audit --prod --audit-level high
