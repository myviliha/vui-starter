name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - run: pip install --quiet semgrep
      - name: Scan (blocking on findings)
        run: >-
          semgrep scan
          --config=p/security-audit
          --config=p/owasp-top-ten
          --config=p/typescript
          --config=p/react
          --config=p/nextjs
          --error --metrics=off
          --exclude node_modules --exclude .next --exclude dist --exclude .turbo

  gitleaks:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0
      - name: Scan for secrets
        run: docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:latest detect --source=/repo --redact --verbose

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
      # npm retired the legacy /security/audits endpoint (410); pnpm 11 uses the
      # bulk advisory endpoint. Run pnpm 11 via npx so the repo's packageManager
      # stays on pnpm 9, and disable pnpm's version self-management so it doesn't
      # re-exec pnpm 9 (which would hit the dead endpoint again).
      - name: Audit production deps (fail on high/critical)
        env:
          npm_config_manage_package_manager_versions: "false"
        run: npx --yes pnpm@11 audit --prod --audit-level high
