name: Deploy to GitHub Pages

# Builds the static export of the backoffice app and deploys it to GitHub Pages.
# In repo Settings → Pages, set Source = "GitHub Actions" (not a branch).
# The custom domain (vui.viliha.com) comes from apps/backoffice/public/CNAME.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; don't cancel an in-progress deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: build static export
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
      - run: npm install -g pnpm@9
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter backoffice build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/backoffice/out

  deploy:
    name: deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
