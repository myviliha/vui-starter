name: Publish

# Publishes @viliha/vui-ui to npm when a v* tag is pushed.
# Requires an npm automation token stored as the NPM_TOKEN repo secret
# (Settings → Secrets and variables → Actions). Automation tokens bypass 2FA.
on:
  push:
    tags: ["v*"]

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    name: publish @viliha/vui-ui
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          cache: pnpm
          registry-url: "https://registry.npmjs.org"
      - run: pnpm install --frozen-lockfile
      # Gate the release on the same checks as local "done".
      - run: pnpm --filter @viliha/vui-ui check-types
      - run: pnpm --filter @viliha/vui-ui test
      # Write the token to ~/.npmrc explicitly — pnpm publish doesn't reliably
      # read setup-node's NODE_AUTH_TOKEN indirection. Fails fast if unset.
      - name: Configure npm auth
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "::error::NPM_TOKEN secret is not set (Settings → Secrets and variables → Actions)."
            exit 1
          fi
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" >> "$HOME/.npmrc"
      - run: pnpm --filter @viliha/vui-ui publish --no-git-checks --access public
