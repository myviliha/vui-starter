name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test:
    name: lint · types · build (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    env:
      COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      # pnpm via corepack (bundled with Node) — pnpm/action-setup still runs on
      # the deprecated Node 20. corepack enable AFTER setup-node puts pnpm on
      # PATH for the install; no setup-node `cache: pnpm` (its cache step resolves
      # the store before corepack runs, so pnpm wouldn't be found yet).
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: ${{ matrix.node }}
      - name: Enable pnpm (corepack)
        run: |
          corepack enable
          corepack prepare --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm check-types
      - run: pnpm build
