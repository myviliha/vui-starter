packages:
  - "apps/*"
  - "packages/*"

# Force patched transitive deps (pnpm 10+ reads overrides here; pnpm 9 reads
# the mirror in package.json). sharp <0.35.0 carries libvips CVEs and next only
# declares ^0.34.5, so pin it forward.
overrides:
  sharp: "^0.35.0"
  # postcss <=8.5.11 has a high-severity sourceMappingURL file-read advisory
  # (GHSA-6g55-p6wh-862q); next pulls in 8.4.31, so pin it forward.
  postcss: "^8.5.12"

onlyBuiltDependencies:
  - esbuild
  - sharp
  - unrs-resolver
  - "@tailwindcss/oxide"

# Supply-chain hardening (pnpm 10.16+; older pnpm ignores unknown keys):
# wait 7 days before installing newly published versions, block sub-deps from
# untrusted sources, and never let an update downgrade security settings.
minimumReleaseAge: 10080
blockExoticSubdeps: true
trustPolicy: no-downgrade
